name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          # Writes ~/.m2/settings.xml with the Central Portal credentials
          # (server id must match <publishingServerId> in pom.xml) and
          # imports the GPG key used to sign the artifacts.
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Build, test & publish to Maven Central
        run: mvn -B clean deploy -Prelease
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Stage release assets
        run: |
          mkdir -p release
          cp target/*.jar release/
          # Ship the POM so consumers can `mvn install:install-file -DpomFile=...`
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          cp pom.xml "release/wayaquick-integration-${VERSION}.pom"
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
